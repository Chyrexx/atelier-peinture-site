{% extends "base.html" %}

{% block title %}Inscription{% endblock %}

{% block content %}

<div class="container" style="max-width:600px;padding-top:140px;padding-bottom:80px;">

    <div class="card shadow-lg p-5 rounded-4">

        <h1 class="text-center mb-4">

            Créer un compte

        </h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">

                <label>Nom</label>

                <input
                    type="text"
                    name="nom"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label>Prénom</label>

                <input
                    type="text"
                    name="prenom"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label>Adresse e-mail</label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label>Mot de passe</label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <div class="mb-4">

                <label>Confirmer le mot de passe</label>

                <input
                    type="password"
                    name="confirmation"
                    class="form-control"
                    required>

            </div>

            <button class="btn btn-success w-100">

                Créer mon compte

            </button>

        </form>

        <hr>

        <p class="text-center">

            Déjà inscrit ?

            <a href="/login">
                Connectez-vous
            </a>

        </p>

    </div>

</div>

{% endblock %}
